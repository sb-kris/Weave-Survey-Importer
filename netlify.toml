# Netlify build config for Weave Survey Importer.
#
# Weave runs as Express locally and on Render. On Netlify the static UI
# is published from public/ and the /api/* surface is served by a single
# serverless function (netlify/functions/api.mts) that wraps the same
# Express app via serverless-http. Local `pnpm dev` is unaffected.

[build]
  # Copy the project-root index.html into public/ so /, /weave-logo.svg,
  # /sounds/*.mp3, etc. all sit in one publish directory. No bundler
  # involved — the static UI ships as-is.
  command = "cp index.html public/index.html"
  publish = "public"

[build.environment]
  # package.json declares engines.node >= 20. Netlify Functions default to
  # Node 18, which makes Express 5 / pino-http 10 misbehave at runtime.
  # Pin to 20 so the function bundle runs on the same engine the project
  # was developed against.
  NODE_VERSION = "20"

[functions]
  # esbuild bundles the TS function + its imports (src/app.ts, the route
  # file, helpers) into a single deployable Lambda artifact.
  node_bundler = "esbuild"
  # pino uses dynamic require() + worker_threads to load its transports
  # and core worker files. Inlining pino into the function bundle breaks
  # those lookups, which manifests as 502 Bad Gateway from Netlify
  # because the function crashes during cold start. Keep pino external so
  # Netlify ships it in the function's node_modules and `require()` resolves
  # normally at runtime. thread-stream is pino's worker IPC helper.
  external_node_modules = ["pino", "pino-http", "pino-pretty", "thread-stream"]

# /api/* must hit the function BEFORE the SPA fallback below; redirect rules
# are evaluated top-down and `force = true` makes this proxy win even when
# the path exists as a static file. The `/api/` prefix is preserved in the
# `to =` so Express's `app.use("/api", router)` still matches.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
  force = true

# Single-page-app fallback: any unknown path serves index.html so the UI
# still loads when a user deep-links somewhere. Real asset paths
# (/weave-logo.svg, /weave-logo.ico, /surveysparrow-symbol.svg,
# /sounds/*.mp3) match files in the publish dir and short-circuit this
# rewrite naturally.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
